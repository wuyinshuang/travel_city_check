server:
  port: 8080
  servlet:
    context-path: /travel-city-checkin
    session:
      timeout: 30m
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,text/css,text/javascript,application/javascript
    min-response-size: 1024

spring:
  application:
    name: travel-city-checkin
  
  datasource:
    url: jdbc:mysql://47.101.153.130:3306/travel_city?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: travel_city
    password: travel_city@123
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss'Z'
    time-zone: Asia/Shanghai

# File upload path
app:
  upload:
    path: /usr/local/tomcat11/travelcity/uploads

logging:
  level:
    com.travelcity: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG